<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  <style>
    #container {
      display: grid;
      grid-template-areas:
        "header header"
        "sidebar-left main"
        "sidebar-right main"
        "footer footer";
      grid-template-rows: auto 1fr auto; /* Regola l'altezza delle righe */
      grid-template-columns: 1fr auto; /* Regola la larghezza delle colonne */
      height: 100vh; /* Imposta l'altezza del container al 100% della viewport height */
    }

    #header {
      grid-area: header;
    }

    #main {
      grid-area: main;
    }

    #sidebar-left {
      grid-area: sidebar-left;
    }

    #sidebar-right {
      grid-area: sidebar-right;
      display: flex;
      flex-wrap: wrap;
    }

    .right-item {
      width: calc(10% - 20px); /* 10% con uno spazio tra i div */
      margin: 10px;
      background-color: #fff; /* Sostituisci con il colore di sfondo desiderato */
      border: 1px solid black;
      padding: 10px;
    }
  </style>
</head>
<body class="bg bg-success">
  <div id="container">
    <div id="header">Header</div>
    <div id="main">Main Content</div>
    <div id="sidebar-left">Left Sidebar</div>
    <div id="sidebar-right" class="d-flex flex-wrap">
      <!-- 10 div nel lato destro -->
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var sidebarRight = document.getElementById("sidebar-right");

        for (var i = 1; i <= 10; i++) {
          var div = document.createElement("div");
          div.className = "right-item";
          div.textContent = "Item " + i;
          sidebarRight.appendChild(div);
        }
      });
    </script>
  </div>
</body>
</html>
