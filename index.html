<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <title>Monopoli</title>
    <script src="src/index.js"></script>
    <style>
        main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .divCard {
            border-radius: 8px;
            width: 90vw; 
            max-width: 600px; 
            padding: 20px;
            background-color: #008f39;
            text-align: center;
        }
        h3 {
            text-align: center;
            font-family: 'CreamySugar';
            src: url('src/fonts/creamy-sugar-font/CreamySugar-gxnGR.ttf') format('ttf');
            font-size: 5rem; /* Utilizzo di "rem" per la dimensione del testo relativa */
            margin-bottom: 2rem;
        }
        label {
            font-size: 1.5rem;
        }
        input[type="number"] {
            width: 100%;
            max-width: 200px; 
            text-align: center;
            border-radius: 5px;
            height: 4vh;
            border-color: #008f39;
        }
        input[type="button"]{
            border-radius: 10px;
            height: 4vh;
        }
        .hidden{
            display: none;
        }
    </style>
</head>
<body>
    <header>
    </header>
    <main class="bg-success">
        <div id="main">
        <h3>Monopoli</h3>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-auto">
                    <div class="card divCard">
                        <div class="card-body">
                            <form method="get" action="">
                                <label for="numeroGiocatori">Inserisci il numero di giocatori</label><br>
                                <input class="mt-3 " type="number" name="numeroGiocatori" id="numeroGiocatori" min="2" max="5" value="2">
                                <div class="mt-4">
                                    <input type="button" id="confermanumero"  value="Conferma">
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
        <div id="giocatori" class="hidden">

        </div>
    </main>
</body>
</html>
